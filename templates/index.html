<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdant Assistant</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="voice-assistant-container" id="main-ui">
        <!-- Header -->
        <header class="va-header">
            <button class="exit-btn" id="exit-btn">
                <span class="icon-close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </span>
                EXIT INTERACTION
            </button>
            <div class="va-title">VERDANT ASSISTANT</div>
            <div class="header-actions">
                <button id="theme-toggle" class="btn btn-sm btn-outline-secondary" style="border-radius: 20px; color: var(--text-muted); border-color: var(--chip-border);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
            </div>
        </header>

        <!-- Main Content (Listening View) -->
        <main class="va-main" id="va-main-view">
            <h1 class="status-text" id="main-status-text">Listening...</h1>

            <div class="mic-wrapper" id="main-mic-wrapper">
                <div class="mic-ring outer-ring"></div>
                <div class="mic-ring inner-ring"></div>
                <button id="main-mic-btn" class="mic-button" aria-label="Microphone">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>

            <div class="transcript-preview" id="transcript-preview">
                <!-- Transcript text will appear here -->
            </div>

            <div class="suggestions-section" id="suggestions-section">
                <div class="suggestions-label">TRY ASKING</div>
                <div class="suggestions-row">
                    <button class="suggestion-chip">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        Where is the cheapest olive oil?
                    </button>
                    <button class="suggestion-chip">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
                        Is the fresh salmon in stock?
                    </button>
                </div>
                <div class="suggestions-row">
                    <button class="suggestion-chip">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                        Find organic kale in Aisle 4
                    </button>
                </div>
            </div>
        </main>

        <!-- Hidden Chat Window for responses -->
        <div id="chat-window-container" class="d-none">
            <div class="chat-header-inner">
                <button id="close-chat-btn" class="close-chat">Back to Voice</button>
            </div>
            <div id="chat-window" class="chat-window">
                <!-- Messages will be appended here -->
            </div>
            
            <form id="chat-form" class="hidden-chat-form">
                <div class="input-group">
                    <input type="text" id="user-input" class="form-control" autocomplete="off" placeholder="Type here...">
                    <button type="submit" id="send-btn" class="btn">Send</button>
                </div>
            </form>
            <div id="reply-indicator" class="reply-indicator d-none">
                <span>Replying to: <strong id="reply-snippet"></strong></span>
                <button type="button" id="cancel-reply" class="btn-close" aria-label="Close"></button>
            </div>
            
            <!-- Dummy elements for existing JS references -->
            <div id="mic-btn" style="display:none;"></div>
            <div id="voice-status" style="display:none;"></div>
            <div id="voice-status-text" style="display:none;"></div>
        </div>

        <!-- Footer -->
        <footer class="va-footer">
            <div class="footer-left">
                <div class="equalizer" id="footer-equalizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <span class="footer-text" id="footer-text">AWAITING VOICE INPUT</span>
            </div>
            <div class="footer-right">
                <button class="info-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    HOW IT WORKS
                </button>
                <div class="logo">Verdant Concierge</div>
            </div>
        </footer>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Marked JS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/main.js"></script>
</body>
</html>
