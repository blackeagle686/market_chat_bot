<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MarketAI — Smart Shopping{% endblock %}</title>
    <meta name="description" content="{% block description %}Your AI assistant inside the supermarket. Voice & Image search powered by AI.{% endblock %}">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap & Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/style.css">
    {% if use_market_css %}
    <link rel="stylesheet" href="/static/market.css">
    {% endif %}
    
    <script>
        // Apply theme early to prevent flash
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    
    <style>
        /* Base styles for the unified header */
        .main-header {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .light-mode .main-header {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s ease;
        }

        .brand:hover {
            transform: scale(1.02);
            color: var(--text-main);
        }

        .brand-icon {
            font-size: 1.5rem;
            color: #3b82f6;
            animation: twinkle 3s ease-in-out infinite;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
        }

        .header-nav {
            display: flex;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .light-mode .header-nav {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.05);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .nav-link i {
            font-size: 1.1rem;
        }

        .nav-link:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        .light-mode .nav-link:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .nav-link.active {
            color: #fff;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .theme-toggle-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .light-mode .theme-toggle-btn {
            border-color: rgba(0, 0, 0, 0.1);
        }

        .theme-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .light-mode .theme-toggle-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .theme-toggle-btn i {
            font-size: 1.25rem;
        }

        .sun-icon { display: none; }
        .moon-icon { display: block; }

        .light-mode .sun-icon { display: block; }
        .light-mode .moon-icon { display: none; }

        @media (max-width: 640px) {
            .brand-name, .nav-link span {
                display: none;
            }
            .header-container {
                padding: 0.6rem 1rem;
            }
            .nav-link {
                padding: 0.5rem;
            }
        }
    </style>
    {% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

    <header class="main-header" id="site-header">
        <div class="header-container">
            <div class="header-left">
                <a href="/" class="brand">
                    <span class="brand-icon">✦</span>
                    <span class="brand-name">MarketAI</span>
                </a>
            </div>
            
            <nav class="header-nav">
                <a href="/" class="nav-link" id="nav-chat" title="Chat with AI">
                    <i class="bi bi-chat-dots"></i>
                    <span>Chat</span>
                </a>
                <a href="/catalog" class="nav-link" id="nav-catalog" title="Browse Catalog">
                    <i class="bi bi-grid"></i>
                    <span>Catalog</span>
                </a>
            </nav>
            
            <div class="header-right">
                <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Theme" aria-label="Toggle light / dark mode">
                    <i class="bi bi-sun-fill sun-icon"></i>
                    <i class="bi bi-moon-stars-fill moon-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/main.js"></script>
    
    <script>
        // Set active nav link
        const currentPath = window.location.pathname;
        if (currentPath === '/') {
            document.getElementById('nav-chat').classList.add('active');
        } else if (currentPath.startsWith('/catalog') || currentPath.startsWith('/category') || currentPath.startsWith('/search')) {
            document.getElementById('nav-catalog').classList.add('active');
        }

        // Global Theme Toggle
        const toggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        
        // Sync body class for existing CSS compatibility
        const syncBodyTheme = () => {
            if (htmlElement.classList.contains('light-mode')) {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        };

        toggleBtn.addEventListener('click', () => {
            const isLight = htmlElement.classList.toggle('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            syncBodyTheme();
        });

        // Initialize body theme
        syncBodyTheme();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
